services:
  frontend:
    image: node:20
    container_name: cloud-task-manager-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    image: node:20
    container_name: cloud-task-manager-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "8081:8081"
    depends_on:
      - cosmosdb

  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cloud-task-manager-cosmosdb
    ports:
      - "8082:8081"
      - "1234:1234"
    tty: true
    volumes:
      - cosmos_data:/data

volumes:
  cosmos_data: